{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">📦 TrackIt Login</h2>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Username</label>
                        <input type="text" name="username" class="form-control shadow-sm" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Password</label>
                        <input type="password" name="password" class="form-control shadow-sm" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg shadow">Sign In</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
