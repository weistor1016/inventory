{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 text-center p-4">
            <div class="card-body">
                <i class="bi bi-geo-alt-fill display-1 text-primary mb-4"></i>
                <h2 class="fw-bold">New Recording</h2>
                <p class="text-muted">Where are you working today?</p>
                
                <form method="POST">
                    <input type="hidden" name="set_place" value="1">
                    <select name="place_id" class="form-select form-select-lg mb-4" required>
                        <option value="" disabled selected>Choose a Location...</option>
                        {% for p in places %}
                        <option value="{{ p.id }}">{{ p.name }}</option>
                        {% endfor %}
                    </select>
                    <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">
                        Start Session <i class="bi bi-arrow-right-short"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
