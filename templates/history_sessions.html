{% extends "base.html" %}
{% block content %}
<h3 class="fw-bold mb-4">📂 Saved History</h3>

<div class="list-group shadow-sm mb-4">
    {% for s in sessions %}
    <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center p-3">
        <a href="{{ url_for('session_details', ts=s.day, place_id=s.place_id) }}" class="text-decoration-none text-dark flex-grow-1">
            <h5 class="mb-1 fw-bold">📍 {{ s.place_name }}</h5>
            <p class="mb-0 text-muted small"><i class="bi bi-calendar"></i> {{ s.day }} | <i class="bi bi-box"></i> {{ s.total_items }} Items Logged</p>
        </a>
        <a href="{{ url_for('delete_session', ts=s.day, place_id=s.place_id) }}" class="btn btn-outline-danger btn-sm ms-3" onclick="return confirm('Delete this entire session?')">
            <i class="bi bi-trash"></i>
        </a>
    </div>
    {% else %}
    <div class="text-center py-5 text-muted">No history found.</div>
    {% endfor %}
</div>

<nav>
    <ul class="pagination justify-content-center">
        <li class="page-item {{ 'disabled' if not pagination.has_prev }}">
            <a class="page-link" href="{{ url_for('history', page=pagination.prev_num) }}">Previous</a>
        </li>
        <li class="page-item active"><span class="page-link">{{ pagination.page }}</span></li>
        <li class="page-item {{ 'disabled' if not pagination.has_next }}">
            <a class="page-link" href="{{ url_for('history', page=pagination.next_num) }}">Next</a>
        </li>
    </ul>
</nav>
{% endblock %}
