{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card shadow-sm p-4 mb-4 border-0">
            <h4 class="fw-bold mb-3"><i class="bi bi-plus-circle text-primary"></i> Add New Item</h4>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Item Name</label>
                    <input type="text" name="name" class="form-control form-control-lg bg-light border-0" placeholder="e.g. Hammer" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Starting Quantity</label>
                    <input type="number" name="qty" class="form-control form-control-lg bg-light border-0" value="1" min="1" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">
                    Add to My Stock
                </button>
            </form>
        </div>
    </div>

    <div class="col-md-8">
        <form method="POST">
            <div class="card shadow-sm p-4 border-0">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0">📦 My Private Inventory</h4>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" name="bulk_save" class="btn btn-success btn-sm shadow-sm px-3">
                            <i class="bi bi-cloud-check me-1"></i> Save All
                        </button>
                        
                        <div class="input-group input-group-sm" style="width: 200px;">
                            <input type="text" name="search" class="form-control border-end-0 bg-light" 
                                   placeholder="Search..." value="{{ search_query }}" form="searchForm">
                            <button class="btn btn-outline-secondary border-start-0 bg-light" type="submit" form="searchForm">
                                <i class="bi bi-search"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th class="border-0">Item Name</th>
                                <th class="border-0 text-center" style="width: 150px;">Available Qty</th>
                                <th class="border-0 text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for item in items %}
                            <tr>
                                <td class="fw-bold">{{ item.name }}</td>
                                <td class="text-center">
                                    <input type="hidden" name="item_ids[]" value="{{ item.id }}">
                                    <input type="number" name="quantities[]" 
                                           class="form-control form-control-sm text-center fw-bold border-0 bg-light mx-auto" 
                                           style="width: 80px;"
                                           value="{{ item.quantity }}" min="0">
                                </td>
                                <td class="text-end">
                                    <a href="{{ url_for('delete_item', id=item.id) }}" 
                                       class="btn btn-sm btn-outline-danger border-0"
                                       onclick="return confirm('Wait! All history for this item will be lost. Proceed?')">
                                        <i class="bi bi-trash3"></i>
                                    </a>
                                </td>
                            </tr>
                            {% else %}
                            <tr>
                                <td colspan="3" class="text-center py-5 text-muted">
                                    <i class="bi bi-box-seam display-1 opacity-25 d-block mb-3"></i>
                                    No items found.
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </form>

        <form id="searchForm" method="GET" action="{{ url_for('inventory') }}" class="d-none"></form>
    </div>
</div>
{% endblock %}
