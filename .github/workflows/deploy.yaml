name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploys:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # CRITICAL: This stops the action if any command fails!
          script_stop: true 
          script: |
            cd ~/inventory
            # Force the server to match GitHub exactly (wipes any manual edits on EC2)
            git fetch --all
            git reset --hard origin/main 
            
            # Update dependencies
            source venv/bin/activate
            pip install -r requirements.txt
            
            # Restart the service
            sudo systemctl restart traxxit